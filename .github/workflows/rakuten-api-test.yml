name: rakuten-api-test
on:
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: probe rakuten API from cloud
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
        run: |
          python - <<'PY'
          import os, requests
          url="https://openapi.rakuten.co.jp/ichibams/api/IchibaItem/Search/20260701"
          h={"User-Agent":"Mozilla/5.0","accessKey":os.environ["RAKUTEN_ACCESS_KEY"],
             "Referer":"https://nekokaitaidesu-cpu.github.io/","Origin":"https://nekokaitaidesu-cpu.github.io"}
          p={"applicationId":os.environ["RAKUTEN_APP_ID"],"keyword":"テーラーメイド ステルス2 ドライバー 中古",
             "hits":5,"format":"json","sort":"+itemPrice"}
          r=requests.get(url,params=p,headers=h,timeout=25)
          print("[RAKUTEN-API cloud] status",r.status_code)
          d=r.json()
          if r.status_code==200:
              print("count",d.get("count"),"returned",len(d.get("Items",[])))
              for it in d.get("Items",[])[:5]:
                  i=it.get("Item",it); print("  Y",i.get("itemPrice"),"|",i.get("itemName","")[:40])
          else:
              print(d)
          PY
