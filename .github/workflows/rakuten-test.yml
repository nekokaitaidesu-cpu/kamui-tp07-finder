name: rakuten-test
on:
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4
      - name: probe
        run: |
          python - <<'PY'
          import urllib.parse, requests
          from bs4 import BeautifulSoup
          kw="テーラーメイド ステルス ドライバー"
          # A) Rakuten with full browser-like headers
          h={"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36",
             "Accept":"text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
             "Accept-Language":"ja,en-US;q=0.9,en;q=0.8","Accept-Encoding":"gzip, deflate, br",
             "sec-ch-ua":'"Chromium";v="124", "Not:A-Brand";v="99"',"sec-ch-ua-mobile":"?0","sec-ch-ua-platform":'"Windows"',
             "Sec-Fetch-Dest":"document","Sec-Fetch-Mode":"navigate","Sec-Fetch-Site":"none","Upgrade-Insecure-Requests":"1"}
          s=requests.Session(); s.headers.update(h)
          u="https://search.rakuten.co.jp/search/mall/"+urllib.parse.quote(kw)+"/"
          try:
              r=s.get(u,timeout=25)
              soup=BeautifulSoup(r.text,"html.parser")
              print(f"[RAKUTEN full-headers] status={r.status_code} len={len(r.text)} items={len(soup.select('div.searchresultitem'))}")
              print("   snippet:", repr(r.text[:120]))
          except Exception as e:
              print("[RAKUTEN] ERR", e)
          # B) golfpartner (shift_jis keyword)
          try:
              q=urllib.parse.quote("テーラーメイド".encode("shift_jis"))
              r=s.get(f"https://www.golfpartner.jp/shop/usedgoods/?search=x&keyword={q}",timeout=25)
              soup=BeautifulSoup(r.content.decode("shift_jis","replace"),"html.parser")
              print(f"[GOLFPARTNER] status={r.status_code} cards={len(soup.select('div.tile_elm_'))}")
          except Exception as e:
              print("[GOLFPARTNER] ERR", e)
          # C) Yahoo closed (NEXT_DATA)
          try:
              r=s.get("https://auctions.yahoo.co.jp/closedsearch/closedsearch?p="+urllib.parse.quote(kw)+"&n=20",timeout=25)
              soup=BeautifulSoup(r.text,"html.parser")
              tag=soup.find("script",id="__NEXT_DATA__")
              import json
              n=0
              if tag:
                  d=json.loads(tag.string); n=len(d["props"]["pageProps"]["initialState"]["search"]["items"]["listing"]["items"])
              print(f"[YAHOO closed] status={r.status_code} next_data={'yes' if tag else 'no'} items={n}")
          except Exception as e:
              print("[YAHOO] ERR", e)
          PY
