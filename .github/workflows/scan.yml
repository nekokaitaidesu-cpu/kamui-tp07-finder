name: scan

# クラウドで定期スキャン（PCの電源に依存しない）。
# 6時間ごと＋手動実行。結果(index.html等)をコミットして Pages を自動更新。
on:
  schedule:
    - cron: "0 */6 * * *"   # UTC基準・6時間ごと
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: |
          pip install requests beautifulsoup4 pillow playwright
          python -m playwright install --with-deps chromium

      - name: run finder
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python finder.py

      - name: commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html contact_sheet.jpg state.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "auto scan $(date -u +'%Y-%m-%d %H:%M')UTC"
            git push
          fi
